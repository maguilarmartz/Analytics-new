<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Recurso interactivo</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-0MQMF0S4CR"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-0MQMF0S4CR');
</script>

<style>
body{
margin:0;
}

iframe{
width:100%;
height:100vh;
border:none;
}
</style>

</head>

<body>

<iframe id="geniallyFrame"></iframe>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const recurso = params.get("recurso");

if(recurso){
const titulo = recurso.replace(/-/g," ");
document.title = titulo;

gtag('event','page_view',{
page_title: titulo
});
}

if(id){
const url = "https://view.genially.com/" + id;
document.getElementById("geniallyFrame").src = url;
}

</script>

</body>
</html>
